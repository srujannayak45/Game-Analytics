services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: fight-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    restart: unless-stopped
    networks:
      - fight-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: fight-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    restart: unless-stopped
    networks:
      - fight-network

  redis:
    image: redis:7.2-alpine
    container_name: fight-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - fight-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fight-backend
    ports:
      - "8000:8000"
    depends_on:
      - kafka
      - redis
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    restart: unless-stopped
    networks:
      - fight-network

  spark:
    build:
      context: ./spark
      dockerfile: Dockerfile
    container_name: fight-spark
    depends_on:
      - kafka
      - redis
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    restart: unless-stopped
    networks:
      - fight-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fight-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - fight-network

networks:
  fight-network:
    driver: bridge
