<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Fight Analytics Dashboard - Real-time Kafka Analytics" />
    <title>Fight Analytics Dashboard</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: Arial, sans-serif;
        background: #0a0a1a;
        color: #fff;
        padding: 20px;
      }
      header {
        background: linear-gradient(135deg, #1a0a2e 0%, #0d0d1a 100%);
        padding: 30px;
        border-bottom: 3px solid #00e5ff;
        box-shadow: 0 4px 20px rgba(0,229,255,0.3);
        margin-bottom: 30px;
        border-radius: 10px;
        text-align: center;
      }
      h1 {
        font-size: 48px;
        background: linear-gradient(90deg, #00e5ff, #00ff88);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: 3px;
        text-transform: uppercase;
        font-weight: bold;
        margin-bottom: 10px;
      }
      .live-indicator {
        display: inline-block;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #00ff00;
        margin-right: 10px;
        animation: pulse 2s infinite;
        box-shadow: 0 0 10px #00ff00;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.5; transform: scale(1.2); }
      }
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
      }
      .stat-card {
        background: linear-gradient(135deg, #1a1a2e, #16213e);
        padding: 20px;
        border-radius: 10px;
        border: 2px solid #00e5ff;
        box-shadow: 0 4px 15px rgba(0,229,255,0.3);
      }
      .stat-card h3 {
        color: #00e5ff;
        margin-bottom: 10px;
        font-size: 18px;
      }
      .stat-value {
        font-size: 32px;
        font-weight: bold;
        color: #00ff88;
      }
      .event-log {
        background: linear-gradient(135deg, #1a1a2e, #16213e);
        padding: 20px;
        border-radius: 10px;
        border: 2px solid #00e5ff;
        max-height: 400px;
        overflow-y: auto;
      }
      .event-log h3 {
        color: #00e5ff;
        margin-bottom: 15px;
      }
      .event-item {
        background: rgba(0,229,255,0.1);
        padding: 10px;
        margin-bottom: 8px;
        border-radius: 5px;
        border-left: 3px solid #00e5ff;
        font-family: monospace;
        font-size: 13px;
      }
      footer {
        text-align: center;
        padding: 20px;
        color: #666;
        font-size: 12px;
        font-family: monospace;
        margin-top: 30px;
        border-top: 1px solid #333;
      }
    </style>
  </head>
  <body>
    <header>
      <div>
        <span class="live-indicator"></span>
        <h1>📊 LIVE KAFKA ANALYTICS DASHBOARD</h1>
      </div>
      <p style="color: #888; font-family: monospace;">
        Real-time Fight Analytics • Auto-updating every 1 second
      </p>
    </header>

    <div class="stats-grid" id="statsGrid">
      <!-- Stats cards will be inserted here -->
    </div>

    <div class="event-log">
      <h3>🎯 LIVE EVENT STREAM (Last 20 Events)</h3>
      <div id="eventLog">
        <p style="color: #666;">Waiting for events...</p>
      </div>
    </div>

    <footer>
      <p>Data Flow: Game → FastAPI → Kafka → Spark Streaming → Redis → Dashboard</p>
    </footer>

    <script>
      async function updateDashboard() {
        try {
          const response = await fetch('http://localhost:8000/api/dashboard');
          const data = await response.json();
          
          // Update stats cards
          const player1 = data.match_summary?.player1 || {};
          const ai = data.match_summary?.ai || {};
          const winner = data.match_summary?.winner || null;
          
          // Winner banner
          let winnerBanner = '';
          if (winner === 'player1') {
            winnerBanner = `
              <div style="grid-column: 1 / -1; background: linear-gradient(135deg, #00ff88, #00e5ff); padding: 25px; border-radius: 10px; text-align: center; box-shadow: 0 8px 30px rgba(0,255,136,0.5);">
                <h2 style="margin: 0; color: #000; font-size: 36px; text-shadow: 0 2px 4px rgba(0,0,0,0.3); font-weight: bold;">
                  🏆 PLAYER 1 WINS! K.O.! 🏆
                </h2>
              </div>
            `;
          } else if (winner === 'ai') {
            winnerBanner = `
              <div style="grid-column: 1 / -1; background: linear-gradient(135deg, #ff3300, #ff6600); padding: 25px; border-radius: 10px; text-align: center; box-shadow: 0 8px 30px rgba(255,51,0,0.5);">
                <h2 style="margin: 0; color: #fff; font-size: 36px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); font-weight: bold;">
                  🤖 AI WINS! K.O.! 🤖
                </h2>
              </div>
            `;
          }
          
          const statsHTML = winnerBanner + `
            <div class="stat-card">
              <h3>👤 PLAYER 1</h3>
              <div class="stat-value">${player1.hp_remaining || 100} HP</div>
              <p style="color: #888; margin-top: 5px;">Damage Dealt: ${player1.total_damage || 0}</p>
              <p style="color: #888;">Hits Landed: ${player1.hits_landed || 0}</p>
              <p style="color: #888;">Most Used: ${player1.most_used_move || 'N/A'}</p>
            </div>
            <div class="stat-card">
              <h3>🤖 SHADOW AI</h3>
              <div class="stat-value">${ai.hp_remaining || 100} HP</div>
              <p style="color: #888; margin-top: 5px;">Damage Dealt: ${ai.total_damage || 0}</p>
              <p style="color: #888;">Hits Landed: ${ai.hits_landed || 0}</p>
              <p style="color: #888;">Most Used: ${ai.most_used_move || 'N/A'}</p>
            </div>
            <div class="stat-card">
              <h3>📊 MATCH STATS</h3>
              <div class="stat-value">ROUND ${player1.round_count || 1}</div>
              <p style="color: #888; margin-top: 5px;">Total Blocks: ${(player1.blocks_used || 0) + (ai.blocks_used || 0)}</p>
              <p style="color: #888;">Total Hits: ${(player1.hits_landed || 0) + (ai.hits_landed || 0)}</p>
            </div>
          `;
          
          document.getElementById('statsGrid').innerHTML = statsHTML;
          
          // Update event log
          const events = data.event_log || [];
          if (events.length > 0) {
            const eventsHTML = events.slice(-20).reverse().map(event => {
              const emoji = event.player_id === 'player1' ? '👤' : '🤖';
              const moveEmoji = {
                'punch': '👊',
                'kick': '🦵',
                'heavy': '💥',
                'block': '🛡️'
              }[event.move] || '⚡';
              
              return `
                <div class="event-item">
                  ${emoji} ${event.player_id.toUpperCase()} → ${moveEmoji} ${event.move.toUpperCase()} 
                  ${event.is_blocked ? '[BLOCKED]' : `(${event.damage} DMG)`}
                  • HP: ${event.attacker_hp} vs ${event.defender_hp}
                </div>
              `;
            }).join('');
            
            document.getElementById('eventLog').innerHTML = eventsHTML;
          }
          
        } catch (error) {
          console.error('Error fetching dashboard data:', error);
        }
      }
      
      // Update every 1 second
      setInterval(updateDashboard, 1000);
      
      // Initial update
      updateDashboard();
    </script>
  </body>
</html>
