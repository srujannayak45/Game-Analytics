<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Street Fury - Fighting Game</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #0a0a0f;
    font-family: 'Rajdhani', sans-serif;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }
  #gameContainer {
    position: relative;
    width: 100vw; height: 100vh;
    overflow: hidden;
  }
  canvas#gameCanvas {
    display: block;
    width: 100%; height: 100%;
    image-rendering: pixelated;
  }

  /* ─── HUD OVERLAY ─── */
  #hud {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 12px 16px 8px;
    pointer-events: none;
    z-index: 10;
  }
  .hud-row {
    display: flex; align-items: center; justify-content: space-between;
  }
  .player-info { display: flex; flex-direction: column; gap: 4px; width: 40%; }
  .player-info.right { align-items: flex-end; }
  .player-name {
    font-family: 'Orbitron', sans-serif;
    font-size: 13px; font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  .p1-name { color: #00e5ff; text-shadow: 0 0 10px #00e5ff88; }
  .p2-name { color: #ff1744; text-shadow: 0 0 10px #ff174488; }

  .health-bar-wrap {
    width: 100%; height: 22px;
    background: #1a1a2e;
    border: 2px solid #333;
    border-radius: 4px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 8px rgba(0,0,0,0.6);
  }
  .health-bar {
    height: 100%;
    transition: width 0.3s ease, background 0.2s;
    border-radius: 2px;
    position: relative;
  }
  .health-bar::after {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 50%;
    background: linear-gradient(to bottom, rgba(255,255,255,0.25), transparent);
    border-radius: 2px 2px 0 0;
  }
  .p1-health { background: linear-gradient(90deg, #00c853, #69f0ae); }
  .p1-health.warning { background: linear-gradient(90deg, #ff6d00, #ffab40); }
  .p1-health.danger { background: linear-gradient(90deg, #d50000, #ff5252); }
  .p2-health { background: linear-gradient(90deg, #ff5252, #d50000); float: right; }
  .p2-health.warning { background: linear-gradient(90deg, #ffab40, #ff6d00); float: right; }
  .p2-health.danger { background: linear-gradient(90deg, #ff5252, #d50000); float: right; }

  .energy-bar-wrap {
    width: 70%; height: 10px;
    background: #111;
    border: 1px solid #1a237e;
    border-radius: 3px;
    overflow: hidden;
    box-shadow: 0 0 6px rgba(41,98,255,0.3);
  }
  .energy-bar {
    height: 100%;
    background: linear-gradient(90deg, #2979ff, #00e5ff);
    transition: width 0.2s;
    box-shadow: 0 0 8px #2979ff88;
  }
  .energy-bar.full {
    background: linear-gradient(90deg, #ffea00, #ff6d00);
    animation: energyPulse 0.5s infinite alternate;
    box-shadow: 0 0 12px #ffea0088;
  }
  @keyframes energyPulse {
    from { opacity: 0.8; }
    to { opacity: 1; }
  }

  .center-info {
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    min-width: 100px;
  }
  .timer {
    font-family: 'Orbitron', sans-serif;
    font-size: 28px; font-weight: 900;
    color: #ffea00;
    text-shadow: 0 0 12px #ffea0066, 0 2px 4px rgba(0,0,0,0.8);
  }
  .combo-counter {
    font-family: 'Orbitron', sans-serif;
    font-size: 12px; font-weight: 700;
    color: #e040fb;
    text-shadow: 0 0 8px #e040fb66;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .combo-counter.active { opacity: 1; }

  /* ─── CONTROLS ─── */
  #controls {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 200px;
    pointer-events: none;
    z-index: 20;
  }
  #joystickArea {
    position: absolute;
    left: 20px; bottom: 30px;
    width: 140px; height: 140px;
    pointer-events: auto;
  }
  .joystick-base {
    width: 140px; height: 140px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.02) 100%);
    border: 2px solid rgba(0,229,255,0.3);
    position: relative;
    box-shadow: 0 0 20px rgba(0,229,255,0.1), inset 0 0 20px rgba(0,0,0,0.3);
  }
  .joystick-knob {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 35%, rgba(0,229,255,0.5), rgba(0,229,255,0.15));
    border: 2px solid rgba(0,229,255,0.5);
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 15px rgba(0,229,255,0.3);
    transition: box-shadow 0.15s;
  }
  .joystick-knob.active {
    box-shadow: 0 0 25px rgba(0,229,255,0.6);
    border-color: rgba(0,229,255,0.8);
  }

  #buttonsArea {
    position: absolute;
    right: 16px; bottom: 20px;
    pointer-events: auto;
  }
  .btn-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 10px;
  }
  .action-btn {
    width: 64px; height: 64px;
    border-radius: 50%;
    border: 2px solid;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    font-family: 'Orbitron', sans-serif;
    font-size: 18px; font-weight: 900;
    cursor: pointer;
    transition: all 0.1s;
    position: relative;
    overflow: hidden;
    pointer-events: auto;
    -webkit-tap-highlight-color: transparent;
  }
  .action-btn::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 50%;
    background: linear-gradient(to bottom, rgba(255,255,255,0.15), transparent);
    border-radius: 50% 50% 0 0;
  }
  .action-btn .btn-label {
    font-size: 8px; font-weight: 500;
    margin-top: 2px;
    letter-spacing: 1px;
    opacity: 0.7;
  }
  .btn-punch {
    background: radial-gradient(circle at 40% 35%, rgba(255,23,68,0.5), rgba(255,23,68,0.15));
    border-color: #ff1744;
    color: #ff1744;
    box-shadow: 0 0 15px rgba(255,23,68,0.3);
    grid-column: 3; grid-row: 1;
  }
  .btn-kick {
    background: radial-gradient(circle at 40% 35%, rgba(255,145,0,0.5), rgba(255,145,0,0.15));
    border-color: #ff9100;
    color: #ff9100;
    box-shadow: 0 0 15px rgba(255,145,0,0.3);
    grid-column: 2; grid-row: 2;
  }
  .btn-catch {
    background: radial-gradient(circle at 40% 35%, rgba(0,229,255,0.5), rgba(0,229,255,0.15));
    border-color: #00e5ff;
    color: #00e5ff;
    box-shadow: 0 0 15px rgba(0,229,255,0.3);
    grid-column: 3; grid-row: 2;
  }
  .btn-dodge {
    background: radial-gradient(circle at 40% 35%, rgba(118,255,3,0.5), rgba(118,255,3,0.15));
    border-color: #76ff03;
    color: #76ff03;
    box-shadow: 0 0 15px rgba(118,255,3,0.3);
    grid-column: 1; grid-row: 2;
  }
  .btn-special {
    background: radial-gradient(circle at 40% 35%, rgba(255,234,0,0.6), rgba(255,109,0,0.2));
    border-color: #ffea00;
    color: #ffea00;
    box-shadow: 0 0 20px rgba(255,234,0,0.4);
    grid-column: 2; grid-row: 1;
    animation: specialPulse 0.8s infinite alternate;
  }
  .btn-special.hidden { display: none; }
  @keyframes specialPulse {
    from { transform: scale(1); box-shadow: 0 0 15px rgba(255,234,0,0.3); }
    to { transform: scale(1.08); box-shadow: 0 0 30px rgba(255,234,0,0.6); }
  }
  .action-btn:active, .action-btn.pressed {
    transform: scale(0.88) !important;
    filter: brightness(1.5);
  }

  /* ─── ROUND OVERLAY ─── */
  #roundOverlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s;
  }
  #roundOverlay.visible { opacity: 1; pointer-events: auto; }
  .round-text {
    font-family: 'Orbitron', sans-serif;
    font-size: 64px; font-weight: 900;
    color: #ffea00;
    text-shadow: 0 0 40px #ffea00, 0 0 80px #ff6d00, 0 4px 8px rgba(0,0,0,0.8);
    animation: roundPop 0.6s ease-out;
  }
  .fight-text {
    font-family: 'Orbitron', sans-serif;
    font-size: 86px; font-weight: 900;
    color: #ff1744;
    text-shadow: 0 0 40px #ff1744, 0 0 80px #d50000, 0 4px 8px rgba(0,0,0,0.8);
    animation: fightPop 0.4s ease-out;
  }
  @keyframes roundPop {
    0% { transform: scale(3); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes fightPop {
    0% { transform: scale(4) rotate(-5deg); opacity: 0; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  /* ─── START SCREEN ─── */
  #startScreen {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 30px;
    background: linear-gradient(180deg, #0a0a1a 0%, #1a0a2e 50%, #0a0a1a 100%);
    z-index: 200;
  }
  #startScreen h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 52px; font-weight: 900;
    background: linear-gradient(135deg, #ff1744, #ff6d00, #ffea00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: none;
    filter: drop-shadow(0 0 20px rgba(255,23,68,0.5));
    animation: titleGlow 2s ease-in-out infinite alternate;
  }
  @keyframes titleGlow {
    from { filter: drop-shadow(0 0 20px rgba(255,23,68,0.4)); }
    to { filter: drop-shadow(0 0 40px rgba(255,109,0,0.6)); }
  }
  #startScreen .subtitle {
    font-family: 'Rajdhani', sans-serif;
    font-size: 18px;
    color: #888;
    letter-spacing: 6px;
    text-transform: uppercase;
  }
  #startBtn {
    font-family: 'Orbitron', sans-serif;
    font-size: 20px; font-weight: 700;
    padding: 16px 50px;
    background: linear-gradient(135deg, #ff1744, #d50000);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 3px;
    box-shadow: 0 0 30px rgba(255,23,68,0.4);
    transition: all 0.3s;
    pointer-events: auto;
  }
  #startBtn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 50px rgba(255,23,68,0.6);
  }

  /* ─── KO SCREEN ─── */
  #koScreen {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 20px;
    background: rgba(0,0,0,0.85);
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s;
  }
  #koScreen.visible { opacity: 1; pointer-events: auto; }
  .ko-text {
    font-family: 'Orbitron', sans-serif;
    font-size: 100px; font-weight: 900;
    color: #ff1744;
    text-shadow: 0 0 40px #ff1744, 0 0 80px #d50000;
    animation: koPop 0.5s ease-out;
  }
  @keyframes koPop {
    0% { transform: scale(5) rotate(-10deg); opacity: 0; }
    60% { transform: scale(0.9) rotate(2deg); }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  .winner-text {
    font-family: 'Orbitron', sans-serif;
    font-size: 28px; font-weight: 700;
    color: #ffea00;
    text-shadow: 0 0 20px #ffea0066;
  }
  #restartBtn {
    font-family: 'Orbitron', sans-serif;
    font-size: 16px; font-weight: 700;
    padding: 14px 40px;
    background: linear-gradient(135deg, #ff1744, #d50000);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 2px;
    box-shadow: 0 0 20px rgba(255,23,68,0.4);
    margin-top: 10px;
  }
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="gameCanvas"></canvas>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-row">
      <div class="player-info">
        <span class="player-name p1-name">TIGER</span>
        <div class="health-bar-wrap">
          <div id="p1Health" class="health-bar p1-health" style="width:100%"></div>
        </div>
        <div class="energy-bar-wrap">
          <div id="p1Energy" class="energy-bar" style="width:0%"></div>
        </div>
      </div>
      <div class="center-info">
        <div id="timer" class="timer">99</div>
        <div id="comboCounter" class="combo-counter">COMBO x0</div>
      </div>
      <div class="player-info right">
        <span class="player-name p2-name">VIPER</span>
        <div class="health-bar-wrap">
          <div id="p2Health" class="health-bar p2-health" style="width:100%"></div>
        </div>
        <div class="energy-bar-wrap" style="margin-left:auto;">
          <div id="p2Energy" class="energy-bar" style="width:0%"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- CONTROLS -->
  <div id="controls">
    <div id="joystickArea">
      <div class="joystick-base" id="joystickBase">
        <div class="joystick-knob" id="joystickKnob"></div>
      </div>
    </div>
    <div id="buttonsArea">
      <div class="btn-grid">
        <div class="action-btn btn-special hidden" id="btnSpecial" data-action="special">
          <span>★</span><span class="btn-label">ULTRA</span>
        </div>
        <div class="action-btn btn-punch" id="btnPunch" data-action="punch">
          <span>P</span><span class="btn-label">PUNCH</span>
        </div>
        <div class="action-btn btn-dodge" id="btnDodge" data-action="dodge">
          <span>D</span><span class="btn-label">DODGE</span>
        </div>
        <div class="action-btn btn-kick" id="btnKick" data-action="kick">
          <span>K</span><span class="btn-label">KICK</span>
        </div>
        <div class="action-btn btn-catch" id="btnCatch" data-action="catch">
          <span>C</span><span class="btn-label">GRAB</span>
        </div>
      </div>
    </div>
  </div>

  <!-- ROUND OVERLAY -->
  <div id="roundOverlay">
    <div id="roundText" class="round-text"></div>
  </div>

  <!-- START SCREEN -->
  <div id="startScreen">
    <h1>STREET FURY</h1>
    <div class="subtitle">Ultimate Showdown</div>
    <button id="startBtn">FIGHT</button>
  </div>

  <!-- KO SCREEN -->
  <div id="koScreen">
    <div class="ko-text">K.O.</div>
    <div id="winnerText" class="winner-text"></div>
    <button id="restartBtn">REMATCH</button>
  </div>
</div>

<script>
// ═══════════════════ SETUP ═══════════════════
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ═══════════════════ GAME STATE ═══════════════════
const GROUND_Y_RATIO = 0.72;
let gameState = 'start'; // start, intro, playing, ko
let timer = 99;
let timerAcc = 0;
let comboCount = 0;
let comboTimer = 0;
let screenShake = 0;
let screenShakeX = 0;
let screenShakeY = 0;

// ═══════════════════ PARTICLES & EFFECTS ═══════════════════
const particles = [];
const floatingTexts = [];

class Particle {
  constructor(x, y, vx, vy, color, size, life, type = 'spark') {
    this.x = x; this.y = y;
    this.vx = vx; this.vy = vy;
    this.color = color;
    this.size = size;
    this.life = life;
    this.maxLife = life;
    this.type = type;
    this.rotation = Math.random() * Math.PI * 2;
    this.rotSpeed = (Math.random() - 0.5) * 0.3;
  }
  update(dt) {
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    this.vy += 400 * dt; // gravity
    this.life -= dt;
    this.rotation += this.rotSpeed;
  }
  draw(ctx) {
    const alpha = Math.max(0, this.life / this.maxLife);
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);
    ctx.globalAlpha = alpha;
    if (this.type === 'spark') {
      ctx.fillStyle = this.color;
      ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
    } else if (this.type === 'ring') {
      ctx.strokeStyle = this.color;
      ctx.lineWidth = 3;
      const r = this.size * (1 - alpha) * 3;
      ctx.beginPath();
      ctx.arc(0, 0, r, 0, Math.PI * 2);
      ctx.stroke();
    } else if (this.type === 'flash') {
      const r = this.size * alpha;
      const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, r);
      grad.addColorStop(0, this.color);
      grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad;
      ctx.fillRect(-r, -r, r * 2, r * 2);
    }
    ctx.globalAlpha = 1;
    ctx.restore();
  }
}

class FloatingText {
  constructor(x, y, text, color, size = 28) {
    this.x = x; this.y = y;
    this.text = text;
    this.color = color;
    this.size = size;
    this.life = 1.2;
    this.maxLife = 1.2;
    this.vy = -120;
    this.scale = 0;
  }
  update(dt) {
    this.y += this.vy * dt;
    this.vy *= 0.96;
    this.life -= dt;
    const t = 1 - this.life / this.maxLife;
    if (t < 0.15) this.scale = t / 0.15;
    else this.scale = 1;
  }
  draw(ctx) {
    if (this.life <= 0) return;
    const alpha = Math.max(0, this.life / this.maxLife);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(this.x, this.y);
    ctx.scale(this.scale, this.scale);
    ctx.font = `900 ${this.size}px 'Orbitron', sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillStyle = 'black';
    ctx.fillText(this.text, 2, 2);
    ctx.fillStyle = this.color;
    ctx.fillText(this.text, 0, 0);
    ctx.strokeStyle = 'white';
    ctx.lineWidth = 1;
    ctx.strokeText(this.text, 0, 0);
    ctx.globalAlpha = 1;
    ctx.restore();
  }
}

function spawnHitParticles(x, y, count = 12) {
  const colors = ['#ffea00', '#ff6d00', '#ff1744', '#ffffff', '#ff5252'];
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 100 + Math.random() * 300;
    particles.push(new Particle(
      x, y,
      Math.cos(angle) * speed,
      Math.sin(angle) * speed - 100,
      colors[Math.floor(Math.random() * colors.length)],
      2 + Math.random() * 5,
      0.3 + Math.random() * 0.5,
      'spark'
    ));
  }
  // Flash
  particles.push(new Particle(x, y, 0, 0, 'rgba(255,255,255,0.8)', 40, 0.2, 'flash'));
  // Ring
  particles.push(new Particle(x, y, 0, 0, '#ffea00', 20, 0.4, 'ring'));
}

function spawnSpecialParticles(x, y) {
  const colors = ['#ffea00', '#ff6d00', '#e040fb', '#00e5ff'];
  for (let i = 0; i < 30; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 150 + Math.random() * 500;
    particles.push(new Particle(
      x, y,
      Math.cos(angle) * speed,
      Math.sin(angle) * speed - 200,
      colors[Math.floor(Math.random() * colors.length)],
      3 + Math.random() * 8,
      0.5 + Math.random() * 0.8,
      'spark'
    ));
  }
  for (let i = 0; i < 3; i++) {
    particles.push(new Particle(x, y, 0, 0, '#ffea00', 60, 0.3 + i * 0.15, 'flash'));
    particles.push(new Particle(x, y, 0, 0, colors[i], 30 + i * 15, 0.5 + i * 0.1, 'ring'));
  }
}

// ═══════════════════ BACKGROUND ═══════════════════
const bgLayers = [];

function initBackground() {
  bgLayers.length = 0;
  // Far buildings
  const buildingsFar = [];
  let bx = -50;
  while (bx < W + 100) {
    const bw = 40 + Math.random() * 100;
    const bh = 80 + Math.random() * 200;
    buildingsFar.push({ x: bx, w: bw, h: bh, windows: Math.floor(Math.random() * 8) + 2 });
    bx += bw + Math.random() * 30;
  }
  bgLayers.push({ type: 'buildings_far', data: buildingsFar, parallax: 0.1 });

  // Mid buildings
  const buildingsMid = [];
  bx = -50;
  while (bx < W + 100) {
    const bw = 50 + Math.random() * 120;
    const bh = 100 + Math.random() * 250;
    buildingsMid.push({ x: bx, w: bw, h: bh, windows: Math.floor(Math.random() * 12) + 3 });
    bx += bw + Math.random() * 20;
  }
  bgLayers.push({ type: 'buildings_mid', data: buildingsMid, parallax: 0.3 });
}
initBackground();

function drawBackground() {
  const groundY = H * GROUND_Y_RATIO;

  // Sky gradient
  const skyGrad = ctx.createLinearGradient(0, 0, 0, groundY);
  skyGrad.addColorStop(0, '#05051a');
  skyGrad.addColorStop(0.4, '#0d0d30');
  skyGrad.addColorStop(0.7, '#1a0a2e');
  skyGrad.addColorStop(1, '#2d1b4e');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, groundY);

  // Moon
  ctx.save();
  ctx.globalAlpha = 0.5;
  const moonGrad = ctx.createRadialGradient(W * 0.8, H * 0.12, 0, W * 0.8, H * 0.12, 40);
  moonGrad.addColorStop(0, '#ffe0b2');
  moonGrad.addColorStop(0.5, '#ffcc80');
  moonGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = moonGrad;
  ctx.fillRect(W * 0.8 - 60, H * 0.12 - 60, 120, 120);
  ctx.fillStyle = '#ffe0b2';
  ctx.beginPath();
  ctx.arc(W * 0.8, H * 0.12, 18, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Far buildings
  const farData = bgLayers[0].data;
  ctx.fillStyle = '#0a0a1a';
  for (const b of farData) {
    ctx.fillRect(b.x, groundY - b.h, b.w, b.h);
    // Random lit windows
    ctx.fillStyle = '#1a1a2e';
    for (let i = 0; i < b.windows; i++) {
      const wx = b.x + 5 + Math.random() * (b.w - 14);
      const wy = groundY - b.h + 10 + Math.random() * (b.h - 20);
      const wwOn = Math.random() > 0.5;
      ctx.fillStyle = wwOn ? (Math.random() > 0.5 ? '#ffcc02' : '#ff910044') : '#0d0d20';
      ctx.fillRect(wx, wy, 6, 8);
    }
    ctx.fillStyle = '#0a0a1a';
  }

  // Mid buildings
  const midData = bgLayers[1].data;
  ctx.fillStyle = '#0f0f25';
  for (const b of midData) {
    ctx.fillRect(b.x, groundY - b.h, b.w, b.h);
    for (let i = 0; i < b.windows; i++) {
      const wx = b.x + 6 + Math.random() * (b.w - 16);
      const wy = groundY - b.h + 12 + Math.random() * (b.h - 24);
      const wwOn = Math.random() > 0.6;
      ctx.fillStyle = wwOn ? '#ffab0066' : '#080818';
      ctx.fillRect(wx, wy, 7, 9);
    }
    ctx.fillStyle = '#0f0f25';
  }

  // Ground
  const gGrad = ctx.createLinearGradient(0, groundY, 0, H);
  gGrad.addColorStop(0, '#1a1a30');
  gGrad.addColorStop(0.3, '#121225');
  gGrad.addColorStop(1, '#0a0a15');
  ctx.fillStyle = gGrad;
  ctx.fillRect(0, groundY, W, H - groundY);

  // Ground line
  ctx.strokeStyle = '#333355';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, groundY);
  ctx.lineTo(W, groundY);
  ctx.stroke();

  // Ground detail lines (perspective)
  ctx.strokeStyle = '#1a1a35';
  ctx.lineWidth = 1;
  for (let i = 0; i < 8; i++) {
    const y2 = groundY + 15 + i * 25;
    ctx.beginPath();
    ctx.moveTo(0, y2);
    ctx.lineTo(W, y2);
    ctx.stroke();
  }

  // Atmospheric fog
  ctx.save();
  ctx.globalAlpha = 0.06;
  const fogGrad = ctx.createLinearGradient(0, groundY - 60, 0, groundY + 30);
  fogGrad.addColorStop(0, 'transparent');
  fogGrad.addColorStop(0.5, '#6a5acd');
  fogGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = fogGrad;
  ctx.fillRect(0, groundY - 60, W, 90);
  ctx.restore();

  // Neon signs
  drawNeonSign(W * 0.15, groundY - 150, 'DANGER', '#ff1744');
  drawNeonSign(W * 0.78, groundY - 180, 'ZONE', '#00e5ff');
}

function drawNeonSign(x, y, text, color) {
  ctx.save();
  ctx.globalAlpha = 0.6 + 0.2 * Math.sin(Date.now() * 0.003);
  ctx.font = '900 18px "Orbitron", sans-serif';
  ctx.textAlign = 'center';
  ctx.shadowColor = color;
  ctx.shadowBlur = 20;
  ctx.fillStyle = color;
  ctx.fillText(text, x, y);
  ctx.shadowBlur = 40;
  ctx.fillText(text, x, y);
  ctx.restore();
}

// ═══════════════════ FIGHTER ═══════════════════
class Fighter {
  constructor(x, isPlayer, name, colorMain, colorAccent, direction) {
    this.x = x;
    this.baseY = 0; // set in update
    this.y = 0;
    this.vx = 0;
    this.vy = 0;
    this.isPlayer = isPlayer;
    this.name = name;
    this.colorMain = colorMain;
    this.colorAccent = colorAccent;
    this.direction = direction; // 1 = right, -1 = left

    this.health = 100;
    this.maxHealth = 100;
    this.energy = 0;
    this.maxEnergy = 100;

    this.state = 'idle'; // idle, walk, punch, kick, catch, dodge, special, hit, knockdown
    this.stateTimer = 0;
    this.animFrame = 0;
    this.animTimer = 0;

    this.width = 50;
    this.height = 110;
    this.attackHit = false;

    // Body parts for animation
    this.headY = 0;
    this.bodyAngle = 0;
    this.armAngleF = 0; // front arm
    this.armAngleB = 0; // back arm
    this.legAngleF = 0; // front leg
    this.legAngleB = 0; // back leg

    this.isBlocking = false;
    this.isDodging = false;
    this.hitStun = 0;

    // AI
    this.aiTimer = 0;
    this.aiAction = null;
  }

  get groundY() {
    return H * GROUND_Y_RATIO;
  }

  get centerX() { return this.x; }
  get centerY() { return this.y - this.height / 2; }

  get hurtbox() {
    return {
      x: this.x - 22,
      y: this.y - this.height,
      w: 44,
      h: this.height
    };
  }

  get attackBox() {
    const dir = this.direction;
    if (this.state === 'punch') {
      return { x: this.x + dir * 20, y: this.y - 80, w: 50, h: 30 };
    } else if (this.state === 'kick') {
      return { x: this.x + dir * 15, y: this.y - 50, w: 60, h: 35 };
    } else if (this.state === 'catch') {
      return { x: this.x + dir * 10, y: this.y - 70, w: 55, h: 60 };
    } else if (this.state === 'special') {
      return { x: this.x + dir * 5, y: this.y - 90, w: 80, h: 90 };
    }
    return null;
  }

  performAction(action) {
    if (this.hitStun > 0 && action !== 'dodge') return;
    if (['punch', 'kick', 'catch', 'special'].includes(this.state)) return;

    if (action === 'punch') {
      this.state = 'punch';
      this.stateTimer = 0.3;
      this.attackHit = false;
    } else if (action === 'kick') {
      this.state = 'kick';
      this.stateTimer = 0.45;
      this.attackHit = false;
    } else if (action === 'catch') {
      this.state = 'catch';
      this.stateTimer = 0.5;
      this.attackHit = false;
    } else if (action === 'dodge') {
      this.state = 'dodge';
      this.stateTimer = 0.4;
      this.isDodging = true;
      this.vx = -this.direction * 300;
    } else if (action === 'special' && this.energy >= this.maxEnergy) {
      this.state = 'special';
      this.stateTimer = 0.8;
      this.attackHit = false;
      this.energy = 0;
    }
  }

  takeHit(damage, knockback) {
    if (this.isDodging) return false;
    this.health = Math.max(0, this.health - damage);
    this.hitStun = 0.3;
    this.state = 'hit';
    this.stateTimer = 0.3;
    this.vx = -this.direction * knockback;
    this.energy = Math.min(this.maxEnergy, this.energy + damage * 0.8);
    return true;
  }

  update(dt, opponent) {
    this.baseY = this.groundY;

    // Timer updates
    if (this.stateTimer > 0) {
      this.stateTimer -= dt;
      if (this.stateTimer <= 0) {
        this.state = 'idle';
        this.isDodging = false;
        this.attackHit = false;
      }
    }
    if (this.hitStun > 0) this.hitStun -= dt;

    // Facing
    if (opponent && this.state === 'idle') {
      this.direction = opponent.x > this.x ? 1 : -1;
    }

    // Movement from joystick (player only)
    if (this.isPlayer && this.state === 'idle') {
      this.x += joystick.dx * 250 * dt;
    }

    // Apply velocity
    this.x += this.vx * dt;
    this.vx *= 0.85;

    // Bounds
    this.x = Math.max(40, Math.min(W - 40, this.x));
    this.y = this.baseY;

    // Animation
    this.animTimer += dt;
    this.updateAnimation(dt);

    // AI
    if (!this.isPlayer) {
      this.updateAI(dt, opponent);
    }
  }

  updateAnimation(dt) {
    const t = this.animTimer;
    switch (this.state) {
      case 'idle':
        this.headY = Math.sin(t * 3) * 2;
        this.bodyAngle = 0;
        this.armAngleF = Math.sin(t * 2) * 0.05 + 0.2;
        this.armAngleB = Math.sin(t * 2 + 1) * 0.05 - 0.1;
        this.legAngleF = 0.1;
        this.legAngleB = -0.1;
        break;
      case 'walk':
        this.headY = Math.sin(t * 8) * 3;
        this.bodyAngle = 0;
        this.armAngleF = Math.sin(t * 8) * 0.5;
        this.armAngleB = -Math.sin(t * 8) * 0.5;
        this.legAngleF = Math.sin(t * 8) * 0.6;
        this.legAngleB = -Math.sin(t * 8) * 0.6;
        break;
      case 'punch': {
        const progress = 1 - this.stateTimer / 0.3;
        if (progress < 0.3) {
          this.armAngleF = -0.5 * (progress / 0.3); // wind up
        } else if (progress < 0.6) {
          this.armAngleF = -0.5 + 2.0 * ((progress - 0.3) / 0.3); // strike
        } else {
          this.armAngleF = 1.5 - 1.3 * ((progress - 0.6) / 0.4); // recover
        }
        this.bodyAngle = this.direction * 0.1 * Math.sin(progress * Math.PI);
        break;
      }
      case 'kick': {
        const progress = 1 - this.stateTimer / 0.45;
        if (progress < 0.25) {
          this.legAngleF = -0.8 * (progress / 0.25);
        } else if (progress < 0.5) {
          this.legAngleF = -0.8 + 2.5 * ((progress - 0.25) / 0.25);
        } else {
          this.legAngleF = 1.7 - 1.5 * ((progress - 0.5) / 0.5);
        }
        this.bodyAngle = -this.direction * 0.15 * Math.sin(progress * Math.PI);
        this.headY = -5 * Math.sin(progress * Math.PI);
        break;
      }
      case 'catch': {
        const progress = 1 - this.stateTimer / 0.5;
        this.armAngleF = 1.2 * Math.sin(progress * Math.PI);
        this.armAngleB = 1.0 * Math.sin(progress * Math.PI);
        this.bodyAngle = this.direction * 0.2 * Math.sin(progress * Math.PI);
        break;
      }
      case 'dodge': {
        const progress = 1 - this.stateTimer / 0.4;
        this.bodyAngle = -this.direction * 0.5 * Math.sin(progress * Math.PI);
        this.headY = -10 * Math.sin(progress * Math.PI);
        break;
      }
      case 'special': {
        const progress = 1 - this.stateTimer / 0.8;
        this.armAngleF = 2.0 * Math.sin(progress * Math.PI);
        this.armAngleB = -1.5 * Math.sin(progress * Math.PI * 0.8);
        this.legAngleF = 1.0 * Math.sin(progress * Math.PI);
        this.bodyAngle = this.direction * 0.3 * Math.sin(progress * Math.PI * 2);
        this.headY = -8 * Math.sin(progress * Math.PI);
        break;
      }
      case 'hit': {
        const progress = 1 - this.stateTimer / 0.3;
        this.bodyAngle = -this.direction * 0.3 * (1 - progress);
        this.headY = -5 * (1 - progress);
        break;
      }
    }
  }

  updateAI(dt, player) {
    if (!player || this.health <= 0) return;
    this.aiTimer -= dt;
    if (this.aiTimer <= 0) {
      const dist = Math.abs(this.x - player.x);

      if (dist > 150) {
        // Move towards player
        this.x += this.direction * 120 * dt;
        this.state = 'walk';
        this.aiTimer = 0.1;
      } else {
        // Choose attack
        const r = Math.random();
        if (r < 0.35) {
          this.performAction('punch');
          this.aiTimer = 0.6 + Math.random() * 0.6;
        } else if (r < 0.6) {
          this.performAction('kick');
          this.aiTimer = 0.8 + Math.random() * 0.5;
        } else if (r < 0.75) {
          this.performAction('catch');
          this.aiTimer = 0.9 + Math.random() * 0.5;
        } else if (r < 0.88) {
          this.performAction('dodge');
          this.aiTimer = 0.5 + Math.random() * 0.4;
        } else if (this.energy >= this.maxEnergy) {
          this.performAction('special');
          this.aiTimer = 1.2;
        } else {
          this.aiTimer = 0.3 + Math.random() * 0.5;
        }
      }
    } else if (this.state === 'idle' || this.state === 'walk') {
      const dist = Math.abs(this.x - player.x);
      if (dist > 130) {
        this.x += this.direction * 80 * dt;
      }
    }
  }

  draw(ctx) {
    const dir = this.direction;
    const gY = this.y;
    const hY = this.headY;

    ctx.save();
    ctx.translate(this.x, gY);

    // Shadow
    ctx.save();
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.ellipse(0, 2, 30, 8, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // Body rotation
    ctx.rotate(this.bodyAngle);

    const isDodge = this.state === 'dodge';
    if (isDodge) ctx.globalAlpha = 0.5;

    // ─── LEGS ───
    const hipY = -22;
    const legLen = 32;

    // Back leg
    ctx.save();
    ctx.translate(dir * -5, hipY);
    ctx.rotate(this.legAngleB * dir);
    ctx.fillStyle = this.darken(this.colorMain, 0.6);
    this.drawLimb(ctx, 0, 0, 12, legLen);
    // Boot
    ctx.fillStyle = '#222';
    ctx.fillRect(-6, legLen - 6, 14, 8);
    ctx.restore();

    // Front leg
    ctx.save();
    ctx.translate(dir * 5, hipY);
    ctx.rotate(this.legAngleF * dir);
    ctx.fillStyle = this.colorMain;
    this.drawLimb(ctx, 0, 0, 13, legLen);
    // Boot
    ctx.fillStyle = '#333';
    ctx.fillRect(-6, legLen - 6, 15, 8);
    ctx.restore();

    // ─── TORSO ───
    const torsoTop = -75 + hY;
    const torsoBot = -22;
    ctx.fillStyle = this.colorAccent;
    ctx.beginPath();
    ctx.moveTo(-18, torsoBot);
    ctx.lineTo(-16, torsoTop + 8);
    ctx.lineTo(16, torsoTop + 8);
    ctx.lineTo(18, torsoBot);
    ctx.closePath();
    ctx.fill();

    // Belt
    ctx.fillStyle = '#111';
    ctx.fillRect(-18, torsoBot - 4, 36, 6);

    // Torso detail
    ctx.strokeStyle = this.darken(this.colorAccent, 0.7);
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, torsoTop + 12);
    ctx.lineTo(0, torsoBot - 4);
    ctx.stroke();

    // ─── BACK ARM ───
    const shoulderY = torsoTop + 14;
    ctx.save();
    ctx.translate(dir * -12, shoulderY);
    ctx.rotate(this.armAngleB * dir);
    ctx.fillStyle = this.darken(this.colorAccent, 0.7);
    this.drawLimb(ctx, 0, 0, 10, 30);
    // Fist
    ctx.fillStyle = this.darken(this.colorMain, 0.8);
    ctx.beginPath();
    ctx.arc(0, 32, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // ─── FRONT ARM ───
    ctx.save();
    ctx.translate(dir * 12, shoulderY);
    ctx.rotate(this.armAngleF * dir);
    ctx.fillStyle = this.colorAccent;
    this.drawLimb(ctx, 0, 0, 11, 30);
    // Fist
    const fistGlow = (this.state === 'punch' || this.state === 'special') && this.stateTimer > 0;
    ctx.fillStyle = fistGlow ? '#ffea00' : this.colorMain;
    ctx.beginPath();
    ctx.arc(0, 33, 7, 0, Math.PI * 2);
    ctx.fill();
    if (fistGlow) {
      ctx.save();
      ctx.globalAlpha = 0.4;
      ctx.shadowColor = '#ffea00';
      ctx.shadowBlur = 20;
      ctx.beginPath();
      ctx.arc(0, 33, 12, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
    ctx.restore();

    // ─── HEAD ───
    const headCenterY = torsoTop - 2 + hY;
    // Neck
    ctx.fillStyle = this.colorMain;
    ctx.fillRect(-5, torsoTop + 5, 10, 8);
    // Head shape
    ctx.fillStyle = this.colorMain;
    ctx.beginPath();
    ctx.ellipse(0, headCenterY, 15, 17, 0, 0, Math.PI * 2);
    ctx.fill();
    // Hair / mask
    ctx.fillStyle = this.darken(this.colorAccent, 0.5);
    ctx.beginPath();
    ctx.ellipse(0, headCenterY - 6, 16, 12, 0, Math.PI, Math.PI * 2);
    ctx.fill();
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(dir * 3, headCenterY - 4, 6 * dir, 4);
    ctx.fillStyle = this.state === 'hit' ? '#ff1744' : '#111';
    ctx.fillRect(dir * 5, headCenterY - 3, 3 * dir, 3);

    // Damage flash
    if (this.state === 'hit') {
      ctx.save();
      ctx.globalAlpha = 0.3 * (this.stateTimer / 0.3);
      ctx.fillStyle = '#ff1744';
      ctx.fillRect(-25, -this.height - 10, 50, this.height + 10);
      ctx.restore();
    }

    // Special aura
    if (this.state === 'special') {
      ctx.save();
      const prog = 1 - this.stateTimer / 0.8;
      ctx.globalAlpha = 0.3 * Math.sin(prog * Math.PI);
      const aGrad = ctx.createRadialGradient(0, -55, 5, 0, -55, 80);
      aGrad.addColorStop(0, '#ffea00');
      aGrad.addColorStop(0.5, '#ff6d00');
      aGrad.addColorStop(1, 'transparent');
      ctx.fillStyle = aGrad;
      ctx.fillRect(-80, -140, 160, 160);
      ctx.restore();
    }

    ctx.restore();
  }

  drawLimb(ctx, x, y, w, h) {
    ctx.beginPath();
    ctx.moveTo(x - w / 2, y);
    ctx.lineTo(x - w / 2 + 2, y + h);
    ctx.lineTo(x + w / 2 - 2, y + h);
    ctx.lineTo(x + w / 2, y);
    ctx.closePath();
    ctx.fill();
  }

  darken(hex, factor) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return `rgb(${Math.floor(r * factor)},${Math.floor(g * factor)},${Math.floor(b * factor)})`;
  }
}

let player1, player2;

function initPlayers() {

  player2 = new Fighter(W * 0.7, false, 'VIPER', '#c0a080', '#8b0000', -1);

  player1.energy = 0;
  player2.energy = 0;
}

// ═══════════════════ COLLISION ═══════════════════
function boxOverlap(a, b) {
  if (!a || !b) return false;
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function checkAttacks(attacker, defender) {
  if (attacker.attackHit) return;
  const atkBox = attacker.attackBox;
  const defBox = defender.hurtbox;
  if (atkBox && boxOverlap(atkBox, defBox)) {
    attacker.attackHit = true;
    let dmg = 0, kb = 0, hitText = '';
    switch (attacker.state) {
      case 'punch': dmg = 6 + Math.random() * 3; kb = 120; hitText = 'HIT!'; break;
      case 'kick': dmg = 10 + Math.random() * 4; kb = 180; hitText = 'SMASH!'; break;
      case 'catch': dmg = 14 + Math.random() * 5; kb = 250; hitText = 'GRAB!'; break;
      case 'special': dmg = 28 + Math.random() * 8; kb = 350; hitText = 'ULTRA!!'; break;
    }
    const hit = defender.takeHit(dmg, kb);
    if (hit) {
      const hx = (attacker.x + defender.x) / 2;
      const hy = defender.y - defender.height * 0.6;
      if (attacker.state === 'special') {
        spawnSpecialParticles(hx, hy);
      } else {
        spawnHitParticles(hx, hy);
      }
      floatingTexts.push(new FloatingText(hx, hy - 20, hitText,
        attacker.state === 'special' ? '#ffea00' : '#ff5252',
        attacker.state === 'special' ? 42 : 30));

      screenShake = attacker.state === 'special' ? 12 : 6;
      attacker.energy = Math.min(attacker.maxEnergy, attacker.energy + 10);

      // Combo
      if (attacker.isPlayer) {
        comboCount++;
        comboTimer = 2;
        if (comboCount >= 3) {
          floatingTexts.push(new FloatingText(hx, hy - 60, `COMBO x${comboCount}!`, '#e040fb', 36));
        }
      }
    }
  }
}

// ═══════════════════ JOYSTICK ═══════════════════
const joystick = { active: false, dx: 0, dy: 0, touchId: null };
const joystickBase = document.getElementById('joystickBase');
const joystickKnob = document.getElementById('joystickKnob');

function handleJoystickStart(cx, cy) {
  const rect = joystickBase.getBoundingClientRect();
  const bx = rect.left + rect.width / 2;
  const by = rect.top + rect.height / 2;
  const dx = cx - bx;
  const dy = cy - by;
  const dist = Math.sqrt(dx * dx + dy * dy);
  const maxDist = 42;
  const clampDist = Math.min(dist, maxDist);
  const angle = Math.atan2(dy, dx);
  joystick.dx = (clampDist / maxDist) * Math.cos(angle);
  joystick.dy = (clampDist / maxDist) * Math.sin(angle);
  joystick.active = true;
  joystickKnob.style.transform = `translate(calc(-50% + ${joystick.dx * maxDist}px), calc(-50% + ${joystick.dy * maxDist}px))`;
  joystickKnob.classList.add('active');
}

function handleJoystickEnd() {
  joystick.active = false;
  joystick.dx = 0;
  joystick.dy = 0;
  joystickKnob.style.transform = 'translate(-50%, -50%)';
  joystickKnob.classList.remove('active');
}

const joystickArea = document.getElementById('joystickArea');
joystickArea.addEventListener('mousedown', e => { joystick.touchId = 'mouse'; handleJoystickStart(e.clientX, e.clientY); });
document.addEventListener('mousemove', e => { if (joystick.touchId === 'mouse') handleJoystickStart(e.clientX, e.clientY); });
document.addEventListener('mouseup', () => { if (joystick.touchId === 'mouse') { joystick.touchId = null; handleJoystickEnd(); } });

joystickArea.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  joystick.touchId = t.identifier;
  handleJoystickStart(t.clientX, t.clientY);
}, { passive: false });
document.addEventListener('touchmove', e => {
  for (const t of e.changedTouches) {
    if (t.identifier === joystick.touchId) { handleJoystickStart(t.clientX, t.clientY); break; }
  }
}, { passive: false });
document.addEventListener('touchend', e => {
  for (const t of e.changedTouches) {
    if (t.identifier === joystick.touchId) { joystick.touchId = null; handleJoystickEnd(); break; }
  }
});

// ═══════════════════ ACTION BUTTONS ═══════════════════
document.querySelectorAll('.action-btn').forEach(btn => {
  const action = btn.dataset.action;
  const trigger = () => {
    if (gameState !== 'playing') return;
    btn.classList.add('pressed');
    setTimeout(() => btn.classList.remove('pressed'), 120);
    player1.performAction(action);
  };
  btn.addEventListener('mousedown', e => { e.preventDefault(); trigger(); });
  btn.addEventListener('touchstart', e => { e.preventDefault(); trigger(); }, { passive: false });
});

// Keyboard support
const keyMap = { KeyZ: 'punch', KeyX: 'kick', KeyC: 'catch', KeyV: 'dodge', KeyB: 'special' };
const keyState = {};
document.addEventListener('keydown', e => {
  if (keyState[e.code]) return;
  keyState[e.code] = true;
  if (gameState !== 'playing') return;
  if (keyMap[e.code]) player1.performAction(keyMap[e.code]);
  if (e.code === 'ArrowLeft') joystick.dx = -1;
  if (e.code === 'ArrowRight') joystick.dx = 1;
});
document.addEventListener('keyup', e => {
  keyState[e.code] = false;
  if (e.code === 'ArrowLeft' && joystick.dx < 0) joystick.dx = 0;
  if (e.code === 'ArrowRight' && joystick.dx > 0) joystick.dx = 0;
});

// ═══════════════════ HUD UPDATE ═══════════════════
function updateHUD() {
  const p1hp = document.getElementById('p1Health');
  const p2hp = document.getElementById('p2Health');
  const p1en = document.getElementById('p1Energy');
  const p2en = document.getElementById('p2Energy');
  const timerEl = document.getElementById('timer');
  const comboEl = document.getElementById('comboCounter');
  const specialBtn = document.getElementById('btnSpecial');

  const p1Pct = (player1.health / player1.maxHealth) * 100;
  const p2Pct = (player2.health / player2.maxHealth) * 100;

  p1hp.style.width = p1Pct + '%';
  p1hp.className = 'health-bar p1-health' + (p1Pct < 25 ? ' danger' : p1Pct < 50 ? ' warning' : '');
  p2hp.style.width = p2Pct + '%';
  p2hp.className = 'health-bar p2-health' + (p2Pct < 25 ? ' danger' : p2Pct < 50 ? ' warning' : '');

  const e1Pct = (player1.energy / player1.maxEnergy) * 100;
  const e2Pct = (player2.energy / player2.maxEnergy) * 100;
  p1en.style.width = e1Pct + '%';
  p1en.className = 'energy-bar' + (e1Pct >= 100 ? ' full' : '');
  p2en.style.width = e2Pct + '%';
  p2en.className = 'energy-bar' + (e2Pct >= 100 ? ' full' : '');

  timerEl.textContent = Math.ceil(timer);

  if (comboTimer > 0 && comboCount > 0) {
    comboEl.textContent = `COMBO x${comboCount}`;
    comboEl.classList.add('active');
  } else {
    comboEl.classList.remove('active');
  }

  // Special button visibility
  if (player1.energy >= player1.maxEnergy) {
    specialBtn.classList.remove('hidden');
  } else {
    specialBtn.classList.add('hidden');
  }
}

// ═══════════════════ GAME FLOW ═══════════════════
const startScreen = document.getElementById('startScreen');
const roundOverlay = document.getElementById('roundOverlay');
const roundText = document.getElementById('roundText');
const koScreen = document.getElementById('koScreen');
const winnerText = document.getElementById('winnerText');

document.getElementById('startBtn').addEventListener('click', startFight);
document.getElementById('restartBtn').addEventListener('click', () => {
  koScreen.classList.remove('visible');
  initPlayers();
  timer = 99;
  comboCount = 0;
  startFight();
});

function startFight() {
  startScreen.style.display = 'none';
  gameState = 'intro';
  showRoundIntro();
}

async function showRoundIntro() {
  roundOverlay.classList.add('visible');
  roundText.className = 'round-text';
  roundText.textContent = 'ROUND 1';
  await sleep(1200);
  roundText.className = 'fight-text';
  roundText.textContent = 'FIGHT!';
  await sleep(800);
  roundOverlay.classList.remove('visible');
  gameState = 'playing';
}

function showKO(winner) {
  gameState = 'ko';
  winnerText.textContent = winner + ' WINS!';
  setTimeout(() => koScreen.classList.add('visible'), 500);
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ═══════════════════ MAIN LOOP ═══════════════════
let lastTime = 0;

function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;

  // Shake
  if (screenShake > 0) {
    screenShakeX = (Math.random() - 0.5) * screenShake * 2;
    screenShakeY = (Math.random() - 0.5) * screenShake * 2;
    screenShake *= 0.85;
    if (screenShake < 0.5) screenShake = 0;
  } else {
    screenShakeX = 0;
    screenShakeY = 0;
  }

  ctx.save();
  ctx.translate(screenShakeX, screenShakeY);

  // Clear
  ctx.clearRect(-20, -20, W + 40, H + 40);

  // Background
  drawBackground();

  if (gameState === 'playing' || gameState === 'ko') {
    // Timer
    if (gameState === 'playing') {
      timerAcc += dt;
      if (timerAcc >= 1) {
        timer = Math.max(0, timer - 1);
        timerAcc -= 1;
        if (timer <= 0) {
          const winner = player1.health >= player2.health ? 'TIGER' : 'VIPER';
          showKO(winner);
        }
      }
    }

    // Combo timer
    if (comboTimer > 0) {
      comboTimer -= dt;
      if (comboTimer <= 0) comboCount = 0;
    }

    // Update fighters
    player1.update(dt, player2);
    player2.update(dt, player1);

    // Collision checks
    if (gameState === 'playing') {
      checkAttacks(player1, player2);
      checkAttacks(player2, player1);

      // KO check
      if (player1.health <= 0) showKO('VIPER');
      else if (player2.health <= 0) showKO('TIGER');
    }

    // Draw fighters (back one first)
    if (player1.x < player2.x) {
      player1.draw(ctx);
      player2.draw(ctx);
    } else {
      player2.draw(ctx);
      player1.draw(ctx);
    }

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
      particles[i].update(dt);
      particles[i].draw(ctx);
      if (particles[i].life <= 0) particles.splice(i, 1);
    }

    // Floating texts
    for (let i = floatingTexts.length - 1; i >= 0; i--) {
      floatingTexts[i].update(dt);
      floatingTexts[i].draw(ctx);
      if (floatingTexts[i].life <= 0) floatingTexts.splice(i, 1);
    }
  } else if (gameState === 'intro') {
    player1.draw(ctx);
    player2.draw(ctx);
  }

  ctx.restore();

  updateHUD();
  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);
</script>
